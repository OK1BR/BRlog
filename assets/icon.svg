<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="cover" x1="56" y1="24" x2="456" y2="464" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7E97E5"/>
      <stop offset="100%" stop-color="#4E6AC0"/>
    </linearGradient>
    <filter id="bookShadow" x="-15%" y="-5%" width="130%" height="125%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="16" result="off"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.22"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#bookShadow)">
    <!-- Cover -->
    <rect x="56" y="24" width="400" height="440" rx="32" fill="url(#cover)"/>

    <!-- Spine groove -->
    <rect x="88" y="40" width="3" height="408" rx="1.5" fill="black" opacity="0.14"/>

    <!-- Embossed inner border -->
    <rect x="76" y="44" width="360" height="400" rx="22" fill="none" stroke="white" stroke-opacity="0.10" stroke-width="2"/>

    <!-- Radio wave on cover -->
    <g transform="translate(256 310)" fill="none" stroke="#FFF6E0" stroke-width="14" stroke-linecap="round">
      <path d="M -38 -12 A 42 42 0 0 1 38 -12"/>
      <path d="M -76 -22 A 80 80 0 0 1 76 -22"/>
      <path d="M -114 -32 A 118 118 0 0 1 114 -32"/>
      <circle cx="0" cy="0" r="11" fill="#FFF6E0" stroke="none"/>
    </g>
  </g>
</svg>
